services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - ./docker/production/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/bootstrap/cache
      - laravel-storage-development:/var/www/storage
    ports:
      - "${NGINX_PORT:-8000}:80"
    depends_on:
      - php-fpm
    networks:
      - laravel-development

  php-fpm:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/Dockerfile
      target: development
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - /var/www/bootstrap/cache
      - laravel-storage-development:/var/www/storage
    env_file:
      - .env
    networks:
      - laravel-development
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    user: postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${DB_DATABASE:-app}
      - POSTGRES_USER=${DB_USERNAME:-laravel}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - postgres-data-development:/var/lib/postgresql/data
    networks:
      - laravel-development

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - laravel-development

  node:
    image: node:22-alpine
    working_dir: /var/www
    volumes:
      - ./:/var/www
    entrypoint: ["sh", "-c", "npm install && npm run build"]
    networks:
      - laravel-development

networks:
  laravel-development:

volumes:
  postgres-data-development:
  laravel-storage-development:
